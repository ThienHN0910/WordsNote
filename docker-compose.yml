version: '3.8'

services:
  api:
    build:
      context: ./src/backend
      dockerfile: WordsNote.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDb__ConnectionString=${MONGODB_CONNECTION_STRING:-mongodb://mongo:27017}
      - MongoDb__DatabaseName=${MONGODB_DATABASE_NAME:-WordsNote}
      - Jwt__Key=${JWT_SECRET_KEY:-WordsNote-Secret-Key-Minimum-256-Bits-Long-And-Secure!!}
      - Jwt__Issuer=${JWT_ISSUER:-WordsNote}
      - Jwt__Audience=${JWT_AUDIENCE:-WordsNote}
    depends_on:
      - mongo
    networks:
      - wordsnote-network

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - wordsnote-network

networks:
  wordsnote-network:
    driver: bridge

volumes:
  mongo-data:
